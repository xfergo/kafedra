<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Новини — Адмінка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header admin-header">
    <div class="logo-section"><h2>АДМІНІСТРАТИВНА ПАНЕЛЬ</h2></div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <ul><li><a href="admin_news.html" style="color: #d9534f;">Новини</a></li><li><a href="admin_users.html">Користувачі</a></li></ul>
    </aside>
    <main class="content">
      <h2>Управління новинами</h2>
      <div style="background: #f9f9f9; padding: 25px; border: 1px solid #ddd; margin-bottom: 30px;">
        <form>
          <div class="form-group"><label>Заголовок *</label><input type="text" required></div>
          <div class="form-group"><label>Текст *</label><textarea rows="4" required></textarea></div>
          <button type="submit" class="btn" data-tooltip="Зберегти та опублікувати на сайті">Зберегти новину</button>
        </form>
      </div>

      <table class="data-table">
        <thead><tr><th>Заголовок</th><th>Дії</th></tr></thead>
        <tbody>
          <tr>
            <td>Відкрита лекція GlobalLogic</td>
            <td><a href="#" onclick="return confirm('Видалити новину?')" style="color: #d9534f;" data-tooltip="Видалити назавжди">Видалити</a></td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>
  <footer class="site-footer admin-header"><p>Адмінпанель © 2025</p></footer>

  <script src="script.js"></script>
</body>
</html>
