<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Вхід — КІТ НТУ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="logo-section">
      <img src="logo.png" alt="Логотип" width="70" height="70">
      <div><h2>НТУ</h2><h3>Кафедра ІТ</h3></div>
    </div>
  </header>

  <nav class="main-nav">
    <ul><li><a href="index.html">Головна</a></li><li><a href="contacts.html">Контакти</a></li></ul>
  </nav>

  <div class="container" style="display: block;">
   <div style="background: #f9f9f9; padding: 25px; border: 1px solid #ddd; border-radius: 5px;">
    <h2>Увійти до кабінету</h2>
    <form id="login-form">
      <div class="form-group">
        <label>Логін (E-mail):</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="form-group">
        <label>Пароль:</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit" class="btn" data-tooltip="Натисніть для входу в систему">Увійти</button>
    </form>
  </div>
      <div style="background: #e8f4f8; padding: 25px; border: 1px solid #bce8f1; border-radius: 5px;">
    <h2>Зареєструватись</h2>
    <form id="register-form">
      <div class="form-group">
        <label>ПІБ:</label>
        <input type="text" id="reg-name" required minlength="3">
      </div>
      <div class="form-group">
        <label>E-mail:</label>
        <input type="email" id="reg-email" required>
      </div>
      <div class="form-group">
        <label>Пароль:</label>
        <input type="password" id="reg-password" required minlength="6">
      </div>
      <button type="submit" class="btn" style="background-color: #0056b3;" data-tooltip="Створити новий акаунт">Зареєструватися</button>
    </form>
  </div>
    </div>
  </div>
  <footer class="site-footer"><p>© 2025 НТУ</p></footer>
  
  <script src="script.js"></script>
</body>
</html>
